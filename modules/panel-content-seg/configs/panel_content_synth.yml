# =============================================================================
# Panel Content Synthesis Config (binary content mask)
#
# Output mask convention:
#   - content_value (default 255): true image content pixels
#   - non_content_value (default 0): everything else (padding, border, canvas/bg, gutters)
#
# Design intent:
#   - Simulate imperfect panel crops from a detector (e.g., YOLO):
#       * sometimes extra canvas/background around the panel
#       * sometimes tight crop that cuts the panel edges
#       * variable borders and padding (including asymmetry and partial sides)
#   - NO "neighbor panels" are pasted (prevents overlap issues)
#   - Gutters are ONLY separator artifacts in the outer canvas margins (non-content)
# =============================================================================

dataset:
  input_images_dir: "/mnt/data-disk/panel-detection/datasets/raw/"   # Real panel images directory (content source)
  output_dir: "./out/panel_content_synth/v1.1--10k/"                   # Output root (images/, masks/, meta/, manifests)
  n_samples: 10000                                                    # Total samples to generate
  val_ratio: 0.2                                                    # Fraction of samples that go to validation manifest
  seed: 1337                                                        # Global seed for reproducibility
  recursive: true                                                   # If true, scan input_images_dir recursively
  exts: [".png", ".jpg", ".jpeg", ".tif", ".tiff", ".bmp", ".webp"]  # Allowed input extensions
  part_size: 1000                                                   # Group outputs into part_0000, part_0001, ... (filesystem-friendly)
  overwrite: false                                                  # If false and output_dir exists -> error (safer)

mask:
  content_value: 255            # Pixel value for content class in PNG mask
  non_content_value: 0          # Pixel value for non-content class (padding/border/canvas/gutters)

canvas:
  # How often to include extra surrounding canvas/background around the panel.
  # This simulates YOLO crops that include background whitespace.
  mode_probs:
    none: 0.85   # No extra canvas: crop is tight to panel area (most common)
    small: 0.12  # Small margin around panel (1..10 px)
    large: 0.03  # Larger margin (percentage of panel size)
  small_margin_px_range: [1, 10]         # Margin size (px) when mode=small
  large_margin_frac_range: [0.05, 0.30]  # Margin size as fraction of panel W/H when mode=large
  per_side_margins: true                 # If true, each side margin is sampled independently (asymmetric crops)

  background:
    base_colors: ["#ffffff", "#f8f8f8", "#f2f2f2"]  # Base canvas colors (paper-like whites)
    paper_texture_prob: 0.25                        # Probability of adding subtle paper noise texture
    paper_noise_sigma: 3.0                          # Noise strength for paper texture
    gradient_prob: 0.10                             # Probability of adding a gentle gradient
    gradient_strength: 0.10                         # Gradient strength (0..~0.2 reasonable)

# Gutters = separator artifacts ONLY in outer canvas margins (NO pasted neighbor images).
# These are always non-content by definition.
gutters:
  enabled_prob: 0.35                                # Probability to draw gutters when canvas mode is small/large
  sides_count_probs: {1: 0.70, 2: 0.25, 3: 0.05}    # Number of margin sides to place gutter artifacts on
  style_probs:
    line: 0.70       # Thin separator line
    strip: 0.30      # Thicker strip (like a grid gap / separator band)
  line_thickness_px_range: [1, 3]                   # Thickness for style=line
  strip_thickness_px_range: [4, 30]                 # Thickness for style=strip
  colors: ["#ffffff", "#fdfdfd", "#f2f2f2", "#eaeaea"]  # Typical separator colors (near-white)
  contrast_with_background: true                    # If too close to background, nudge lighter/darker for visibility

panel:
  size:
    # Final panel size (before canvas margins). Long side is sampled from choices,
    # and width/height derived using aspect_ratio_range.
    long_side_choices: [512, 640]                   # Output resolution buckets
    aspect_ratio_range: [0.75, 1.33]                # W/H range

  # Some panels have rounded corners (common in figure panels/screenshots).
  rounded_prob: 0.02                                 # Probability of rounded panel outer shape
  corner_radius_frac_range: [0.02, 0.08]            # Radius as fraction of min(panel_w, panel_h)

  rotation:
    # Keep near-zero rotation (you asked for minimum rotation).
    prob: 0.01                                      # Probability of applying rotation
    deg_range: [-1.0, 1.0]                          # Rotation range in degrees (small)

  tight_crop:
    # Simulate too-tight detector crops: cuts away panel edges (border/content may be truncated).
    enabled_prob: 0.05                              # Probability to apply tight-crop cutting
    sides_count_probs: {1: 0.75, 2: 0.22, 3: 0.03}  # How many sides get cut
    cut_px_range: [1, 25]                           # Cut size (px) per selected side

structure_control:
  # Controls high-level presence of border/padding to match your distribution needs.
  both_none_prob: 0.50        # 50%: no border and no padding at all (content touches panel shape)
  allow_only_one_prob: 0.10   # From remaining: 10% cases where ONLY border OR ONLY padding exists

  border:
    enabled_prob: 1.0         # If border is allowed by above logic, still apply with this probability
    # Border sides distribution (your requirement: more one-side borders, random per-side thickness).
    sides_count_probs: {1: 0.50, 2: 0.20, 3: 0.20, 4: 0.10}

    # Border thickness sampled per-side (not uniform): choose small vs large then sample px range.
    thickness_mode_probs:
      small: 0.80             # 80% of enabled borders are 1..10px
      large: 0.20             # 20% are 11..24px
    small_px_range: [1, 10]
    large_px_range: [11, 24]

    # Visual border style (mask remains binary; borders are always non-content).
    style_probs:
      solid: 0.80             # Standard solid border
      low_contrast: 0.10      # Border near padding color (hard border cases)
      dashed: 0.06            # Dashed border lines
      broken: 0.04            # Partial/missing segments (damaged border)

    base_colors: ["#000000", "#222222", "#444444", "#666666"]  # Typical border colors
    colored_prob: 0.05                                         # Probability of random colored border
    broken_missing_frac_range: [0.15, 0.45]                    # Missing fraction used for broken borders
    dash_length_px_range: [6, 20]                              # Dash length for dashed borders
    dash_gap_px_range: [4, 16]                                 # Gap length for dashed borders

  padding:
    enabled_prob: 1.0         # If padding is allowed by above logic, still apply with this probability

    # Padding thickness sampled per side. This creates realistic uneven padding.
    thickness_mode_probs:
      small: 0.80             # 80%: 1..10px (common)
      large: 0.20             # 20%: 11..80px (rare but important)
    small_px_range: [1, 10]
    large_px_range: [11, 80]
    asym_prob: 0.70           # Probability padding is asymmetric per side

    # Padding fill color/texture (non-content).
    colors: ["#ffffff", "#f7f7f7", "#eeeeee", "#111111", "#fff3e0", "#e8f5e9"]
    texture_prob: 0.25        # Add subtle noise texture (paper/scanner artifacts)
    texture_sigma: 4.0        # Strength of padding texture noise

content_region:
  # Where the "true content" is inside the panel (before border/padding).
  # Mask will be 255 ONLY for this region (inside panel shape).
  mode_probs:
    full: 0.40                # Content covers the available inner region
    random_rect: 0.45         # Content is a random rectangle within the inner region
    random_square: 0.15       # Content is a random square (some panels are square crops)
  area_frac_range: [0.55, 1.00]      # Area of content region relative to available inner region
  aspect_ratio_range: [0.60, 1.80]   # Aspect ratio range for random_rect (W/H)
  match_source_ar_prob: 0.60         # Probability to follow the input image AR when sampling content rect

content_fit:
  # How we fit the real input image into the content region.
  # "cover" means: resize preserving AR -> crop to fill region (NO letterbox bars).
  strategy: "cover"
  crop_jitter: 0.20           # 0=center crop; higher => more random crop offset (simulate varied crops)

  # Mild photometric variation applied ONLY to the content patch.
  color_jitter_prob: 0.30
  brightness_range: [0.92, 1.08]
  contrast_range: [0.92, 1.12]
  gamma_range: [0.92, 1.12]

degradations:
  # Post-effects to better match dataset noise/compression blur etc.
  max_per_sample: 3
  jpeg_prob: 0.50
  jpeg_quality_range: [25, 95]
  blur_prob: 0.20
  blur_ksize_choices: [3, 5, 7]
  noise_prob: 0.25
  noise_sigma_range: [2, 12]
  gamma_prob: 0.15
  gamma_range: [0.90, 1.15]
  vignette_prob: 0.08
  resize_artifact_prob: 0.12
  resize_scale_range: [0.55, 0.90]
